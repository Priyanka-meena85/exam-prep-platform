<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Exam Prep Platform</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
    }
    .auth-brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-brand h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .auth-brand span {
      font-size: 13px;
      color: var(--text-muted);
    }
    .alert-danger {
      background: var(--danger-light);
      color: var(--danger);
      padding: 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-brand">
      <h1>Computer Anudeshak</h1>
      <span>Exam Prep Platform</span>
    </div>
    
    <div class="card">
      <div class="card-header" style="justify-content: center;">
        <span style="font-size: 16px; font-weight: 600;">Create Account</span>
      </div>
      <div class="card-body">
        {% if error %}
          <div class="alert-danger">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/register">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Choose a username" autocomplete="username">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password" autocomplete="new-password">
          </div>
          
          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password" autocomplete="new-password">
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Register</button>
        </form>
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted);">
      Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In here</a>
    </div>
  </div>
</body>
</html>
